site_name: Nicolas DAVAL - Data Architect & Tech Lead
site_url: https://nicodaval.github.io/
site_description: "CV - Nicolas DAVAL - Data Architect & Tech Lead - 22+ ans d'expérience"
site_author: Nicolas DAVAL

theme:
  name: material
  language: fr
  palette:
    - scheme: default
      primary: custom
      accent: custom
  font:
    text: Google Sans, Inter, sans-serif
    code: JetBrains Mono
  features:
    - navigation.tabs
    - content.tooltips
  icon:
    logo: material/account-tie

plugins:
  - search
  - i18n:
      docs_structure: suffix
      languages:
        - locale: fr
          default: true
          name: Français
          build: true
        - locale: en
          default: false
          name: English
          build: true

markdown_extensions:
  - toc:
      toc_depth: 0

extra:
  alternate:
    - name: Français
      link: /
      lang: fr
    - name: English
      link: /en/
      lang: en

extra_css:
  - stylesheets/custom.css

nav:
  - CV: index.md
  - Projets Clés: projects.md
