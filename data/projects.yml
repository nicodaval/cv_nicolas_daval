projects:
- title_fr: Migration Hadoop vers Dataplateforme New Gen
  title_en: Hadoop to Next-Gen Data Platform Migration
  company: Stellantis Financial Services
  period: 2021 - présent
  description_fr: 'Pilotage technique de la migration de la plateforme Hadoop legacy
    vers la dataplateforme nouvelle génération (Snowflake). Analyse de l''existant,
    définition de la stratégie de migration, spécifications techniques et choix de
    modélisation avec le partenaire.

    '
  description_en: 'Led the migration from the legacy Hadoop platform to the next-generation
    data platform (Snowflake). Analyzed existing system, defined migration strategy,
    produced technical specifications and modeling choices in collaboration with the
    partner.

    '
  technologies:
  - Hadoop
  - Spark
  - Snowflake
  - dbt
  - Python
  - AWS
  outcomes_fr:
  - Stratégie de migration définie et validée
  - Spécifications techniques livrées
  - Choix de modélisation arrêtés avec le partenaire
  outcomes_en:
  - Migration strategy defined and validated
  - Technical specifications delivered
  - Modeling choices finalized with partner
  display: true
- title_fr: Plateforme Data Snowflake sur AWS
  title_en: Snowflake Data Platform on AWS
  company: Stellantis Financial Services
  period: 2021 - présent
  description_fr: 'Définition et mise en œuvre de la plateforme data d''entreprise
    sur Snowflake/AWS. Conception et développement du framework EL (Extract-Load),
    Dag Factory et du framework dbt pour la transformation. Conception et développement
    d''un extracteur générique sur base python python et dlthub compatible snowflake/postgresql/duckDB
    Orchestration via Airflow/Astronomer Cosmos. Gouvernance et privacy intégrées.

    '
  description_en: 'Design and implementation of the enterprise data platform on Snowflake/AWS.
    Design and implementation of EL (Extract-Load) framework and dbt transformation
    framework. Design and impplement Generic extractor tools with python dlthub, compatible
    with snowflake/postgresql/duckDB. Orchestration via Airflow/Astronomer Cosmos.
    Built-in governance and privacy.

    '
  technologies:
  - Snowflake
  - AWS S3
  - AWS Glue
  - dbt
  - Airflow
  - Astronomer Cosmos
  - DAG Factory
  - Elementary
  - Python
  outcomes_fr:
  - Plateforme data unifiée pour les filiales européennes (DE, GB, ES, FR)
  - Framework EL et dbt industrialisés
  - Stratégie privacy définie et implémentée
  outcomes_en:
  - Unified data platform for European subsidiaries (DE, GB, ES, FR)
  - Industrialized EL and dbt frameworks
  - Privacy strategy defined and implemented
  display: true
