    '
  technologies:
  - MongoDB
  - Spring Boot
  - Kafka
  - RabbitMQ
  - AWS
  - Docker
  outcomes_fr:
  - Plateforme digitale opérationnelle
  - Migration réussie vers AWS
  - Architecture event-driven en production
  outcomes_en:
  - Operational digital platform
  - Successful AWS migration
  - Event-driven architecture in production
  display: true
