name: CI

on:
  push:
    branches:
      - main
      - 'feat/**'
      - 'fix/**'
  pull_request:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Node dependencies
        run: npm ci

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: requirements-pdf.txt

      - name: Install Python dependencies
        run: pip install -r requirements-pdf.txt

      - name: Generate PDFs
        run: python scripts/generate_pdf.py

      - name: Generate cv.json
        run: python scripts/generate_json.py

      - name: Generate LinkedIn content
        run: python scripts/generate_linkedin.py

      - name: Lint
        run: npm run lint

      - name: Build Next.js
        run: npm run build

      - name: Upload build artifact
        if: github.event_name == 'pull_request'
        uses: actions/upload-artifact@v4
        with:
          name: site-${{ github.sha }}
          path: out
          retention-days: 7
